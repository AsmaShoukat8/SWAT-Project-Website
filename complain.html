<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>complainform</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container-fluid  shadow-lg text-center" style="width: 80%;">
        <img src="logoswat.png" alt="SWAT Logo" width="90px" class="text-center mt-3 ">
    <h2 class="mt-4">Sindh Water & Agriculture Transformation Project <h4>
    <p class="h6">Online complaint Form</p>
    
<form action="" class="fs-5">
    <div class="row mt-5 mb-5 ms-2 ">
        <div class="col-md text-start ">
            <label for="name" class="form-label">Name of Complainant</label>
            <br>
            <input type="text" name="name" id="name" class="form-control w-100" required placeholder="Enter Your Name">
        </div>
        <div class="col-md text-start">
             <label for="f/hname" class="form-label">Father/Husband of Complainant</label>
             <br>
            <input type="text" class="form-control w-100" name="" id="f/hname" required placeholder="Enter Your Father/Husband Name">
        </div>
    </div>
 
    <div class="row mb-5 ms-2 ">
        <div class="col-md text-start">
             <label for="cnic" class="form-label" >CNIC No</label>
             <br>
            <input type="text" class="form-control w-100"  name="cnic" id="cnic" required placeholder="XXXXX-XXXXXXX-X">
        </div>
        <div class="col-md text-start">
             <label for="district" class="form-label">Districts</label> <br>
            <select id="district" class="form-control" name="district" required="">
                            <option>Select District</option>
                            <option value="Badin">Badin</option>
                            <option value="Dadu">Dadu</option>
                            <option value="Ghotki">Ghotki</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Jacobabad">Jacobabad</option>
                            <option value="Jamshoro">Jamshoro</option>
                            <option value="Kashmore">Kashmore</option>
                            <option value="Khairpur">Khairpur</option>
                            <option value="Larkana">Larkana</option>
                            <option value="Matiari">Matiari</option>
                            <option value="Mirpur Khas">Mirpur Khas</option>
                            <option value="Naushahro Feroze">Naushahro Feroze</option>
                            <option value="Shaheed Benazirabad">Shaheed Benazirabad</option>
                            <option value="Qambar Shahdadkot">Qambar Shahdadkot</option>
                            <option value="Sanghar">Sanghar</option>
                            <option value="Shikarpur">Shikarpur</option>
                            <option value="Sukkur">Sukkur</option>
                            <option value="Tando Allahyar">Tando Allahyar</option>
                            <option value="Tando Muhammad Khan">Tando Muhammad Khan</option>
                            <option value="Tharparkar">Tharparkar</option>
                            <option value="Thatta">Thatta</option>
                            <option value="Umerkot">Umerkot</option>
                            <option value="Sujawal">Sujawal</option>
                            <option value="Malir">Malir</option>
                            
                        </select>
        </div>


        <div class="row mb-5  mt-5">
        
        <div class="col-md text-start">
             <label for="talukas" class="form-label">Talukas</label> <br>
            <select id="talukas" class="form-control" name="talukas" required="">
                            <option>Select Talukas</option>
                            <option value="Karachi City">Karachi City</option>
<option value="Karachi Saddar">Karachi Saddar</option>
<option value="Gulshan-e-Iqbal">Gulshan-e-Iqbal</option>
<option value="Korangi">Korangi</option>
<option value="Malir">Malir</option>

<option value="Hyderabad City">Hyderabad City</option>
<option value="Hyderabad Rural">Hyderabad Rural</option>
<option value="Latifabad">Latifabad</option>
<option value="Qasimabad">Qasimabad</option>

<option value="Talhar">Talhar</option>
<option value="Matli">Matli</option>
<option value="Tando Bago">Tando Bago</option>

<option value="Mirpur Khas">Mirpur Khas</option>
<option value="Digri">Digri</option>
<option value="Kot Ghulam Muhammad">Kot Ghulam Muhammad</option>
<option value="Sindhri">Sindhri</option>

<option value="Sanghar">Sanghar</option>
<option value="Tando Adam">Tando Adam</option>
<option value="Shahdadpur">Shahdadpur</option>

<option value="Larkana">Larkana</option>
<option value="Ratodero">Ratodero</option>
<option value="Dokri">Dokri</option>

<option value="Sukkur">Sukkur</option>
<option value="Rohri">Rohri</option>
<option value="Pano Aqil">Pano Aqil</option>

<option value="Khairpur">Khairpur</option>
<option value="Kot Diji">Kot Diji</option>
<option value="Gambat">Gambat</option>

<option value="Dadu">Dadu</option>
<option value="Mehar">Mehar</option>
<option value="Johi">Johi</option>

<option value="Thatta">Thatta</option>
<option value="Mirpur Sakro">Mirpur Sakro</option>
<option value="Gharo">Gharo</option>

<option value="Umerkot">Umerkot</option>
<option value="Kunri">Kunri</option>
<option value="Samaro">Samaro</option>

<option value="Mithi">Mithi</option>
<option value="Islamkot">Islamkot</option>
<option value="Diplo">Diplo</option>
                            
                        </select>
        </div>

        <div class="col-md text-start">
             <label for="contact" class="form-label" >Contact No</label>
             <br>
            <input type="text" class="form-control w-100"  name="contact" id="contact" required placeholder="XXXXX-XXXXXXX-X">
        </div>

    </div>

    <div class="row mb-5  mt-3">
        
        <div class="col-md text-start">
            <label  class="form-label" for="nature_of_complaint">Nature of Complaint</label>
            <select required id="nature_of_complaint" class="form-control" name="nature_of_complaint" required="">
                            <option value="De-Credit">De-Credit</option>
                            <option value="Eligible">Eligible</option>
                            <option value="Ineligible">Ineligible</option>
                            <option value="Underage Case">Underage Case</option>
                            <option value="Error 938">Error 938</option>
                            <option value="Error 920">Error 920</option>
                            <option value="Error 933 - District Not Match">Error 933 - District Not Match </option>
                            <option value="Error 368 - CNIC cannot be verified">Error 368 - CNIC cannot be verified</option>
                            <option value="Death Case">Death Case</option>
                            <option value="Finger Print Issue">Finger Print Issue</option>
                            <option value="Expired CNIC">Expired CNIC</option>
                            <option value="Wrong CNIC">Wrong CNIC</option>
                            <option value="Others">Others</option>
                        </select>
        </div>

        <div class="row mb-5  mt-3">
        
        <div class="col-md text-start">
            <label  class="form-label" for="des">Other Description</label>
            <textarea name="des" id="des" class="form-control" required rows="5" placeholder="Description Here"></textarea>
        </div>
<div class="row ms-2 mb-1  mt-5">
        <button class="  bg-info text-light text-center" type="submit " name="submit" value="submit" style=" font-size: 20px; border: none; height: 50px; border-radius: 6px;">
        Submit
        </button>
        </div>
</form>
    </div>
</body>
</html>
